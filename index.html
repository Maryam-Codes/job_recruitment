<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiM Recruitment — AI Assistant</title>
  <meta name="description"
    content="Chat with DigiM's AI recruitment assistant to learn about available job positions and apply.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Landing Page Background -->
  <div class="landing-page">
    <div class="landing-content">
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#grad1)" />
            <path d="M14 16h6v16h-6V16zm8 4h6v12h-6V20zm8-8h6v20h-6V12z" fill="white" opacity="0.9" />
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6366f1" />
                <stop offset="1" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>DigiM <span class="highlight">Recruitment</span></h1>
        <p class="tagline">Connecting Talent with Opportunity</p>
      </div>
      <div class="cta-section">
        <p class="cta-text">Have questions about our open positions? Chat with our AI assistant!</p>
        <button class="cta-button" onclick="toggleChat()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          Start Chatting
        </button>
      </div>
    </div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <!-- Chat Widget -->
  <div id="chat-widget" class="chat-widget">
    <!-- Chat Toggle Button -->
    <button id="chat-toggle" class="chat-toggle" onclick="toggleChat()" aria-label="Open chat">
      <svg id="chat-icon-open" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <svg id="chat-icon-close" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" style="display:none">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
      <span class="notification-dot" id="notification-dot"></span>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" class="chat-window">
      <!-- Header -->
      <div class="chat-header">
        <div class="header-left">
          <div class="avatar">
            <svg viewBox="0 0 32 32" fill="none">
              <rect width="32" height="32" rx="8" fill="url(#hgrad)" />
              <path d="M9 11h4v10H9V11zm5 3h4v7h-4V14zm5-5h4v12h-4V9z" fill="white" opacity="0.9" />
              <defs>
                <linearGradient id="hgrad" x1="0" y1="0" x2="32" y2="32">
                  <stop stop-color="#6366f1" />
                  <stop offset="1" stop-color="#8b5cf6" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="header-info">
            <h3>DigiM Assistant</h3>
            <span class="status-indicator">
              <span class="status-dot"></span>
              Online
            </span>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="clearChat()" title="Clear chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"></polyline>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
          </button>
          <button class="header-btn" onclick="toggleChat()" title="Close chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
        </div>
      </div>

      <!-- Pre-Chat Form -->
      <div id="prechat-form" class="prechat-form">
        <div class="prechat-content">
          <div class="prechat-icon">👋</div>
          <h4>Welcome to DigiM Recruitment</h4>
          <p>Please share your details to get started</p>
          <div class="prechat-fields">
            <input type="text" id="prechat-name" placeholder="Your Name" autocomplete="name">
            <input type="email" id="prechat-email" placeholder="Your Email" autocomplete="email">
          </div>
          <button class="prechat-btn" onclick="submitPrechat()">Start Chat</button>
          <span class="prechat-note">Your info helps us personalize your experience</span>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="chat-messages" class="chat-messages" style="display:none">
        <!-- Welcome message will be added by JS -->
      </div>

      <!-- Quick Replies -->
      <div id="quick-replies" class="quick-replies">
        <button class="quick-reply-btn" onclick="sendQuickReply('What job openings do you have?')">📋 View
          Openings</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('Tell me about the Key Accounts Manager role')">🔑 KAM
          Role</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('Tell me about the Manager Sales role')">📊 Sales
          Role</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('I want to apply')">✅ Apply Now</button>
      </div>

      <!-- Input Area -->
      <div class="chat-input-area">
        <div class="input-wrapper">
          <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off"
            onkeypress="handleKeyPress(event)">
          <button id="send-btn" class="send-btn" onclick="sendMessage()" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="powered-by">
          Powered by <strong>DigiM Recruitment</strong>
        </div>
      </div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>

</html>
